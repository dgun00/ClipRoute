
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>잘생긴 애들의 제주 우정 여행</title>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=cxmkmsecgi"></script>
</head>
<body>
<div id="map" style="width:100%;height:100vh;"></div>

<script>
var map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(33.511822, 126.6993931),
    zoom: 10
});


new naver.maps.Marker({
    position: new naver.maps.LatLng(33.511822, 126.6993931),
    map: map,
    icon: {
        content: '<div style="background:#FF0000;color:white;border-radius:50%;width:28px;height:28px;line-height:28px;text-align:center;font-weight:bold;">3</div>',
        size: new naver.maps.Size(28, 28),
        anchor: new naver.maps.Point(14, 14)
    },
    title: "스위트홈"
});



</script>
</body>
</html>
