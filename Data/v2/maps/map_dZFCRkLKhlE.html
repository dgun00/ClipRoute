
<!DOCTYPE html>
<html>
<head>

  <title>(SUB) '여름 제주, 여기 꼭 가봐요…‘🍊 | 맛집•카페 지도 링크 공유 | 잘 안 알려진 시크릿 비치 | 제주도 서쪽 여행</title>

<body>
<div id="map" style="width:100%;height:100vh;"></div>

<script>
var map = new naver.maps.Map('map', {

new naver.maps.Marker({

    title: "자매국수"
});


new naver.maps.Marker({
    position: new naver.maps.LatLng(33.3943224, 126.23989),
    map: map,
    icon: {
        content: '<div style="background:#FF0000;color:white;border-radius:50%;width:28px;height:28px;line-height:28px;text-align:center;font-weight:bold;">2</div>',
        size: new naver.maps.Size(28, 28),
        anchor: new naver.maps.Point(14, 14)
    },
    title: "협재해수욕장"

new naver.maps.Marker({

new naver.maps.Marker({

        anchor: new naver.maps.Point(14, 14)
    },
    title: "대한목장"

new naver.maps.Polyline({
    map: map,
    path: [new naver.maps.LatLng(33.4985513, 126.4591844),new naver.maps.LatLng(33.3943224, 126.23989),new naver.maps.LatLng(33.217709, 126.2497839)],
