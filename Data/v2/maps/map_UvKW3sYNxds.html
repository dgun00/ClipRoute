
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TWS TOURS in JEJU | EP.1</title>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=cxmkmsecgi"></script>
</head>
<body>
<div id="map" style="width:100%;height:100vh;"></div>

<script>
var map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(33.5069232, 126.4929933),
    zoom: 10
});


new naver.maps.Marker({
    position: new naver.maps.LatLng(33.5069232, 126.4929933),
    map: map,
    icon: {
        content: '<div style="background:#FF0000;color:white;border-radius:50%;width:28px;height:28px;line-height:28px;text-align:center;font-weight:bold;">1</div>',
        size: new naver.maps.Size(28, 28),
        anchor: new naver.maps.Point(14, 14)
    },
    title: "제주국제공항"
});


new naver.maps.Marker({
    position: new naver.maps.LatLng(33.5557089, 126.7966561),
    map: map,
    icon: {
        content: '<div style="background:#FF0000;color:white;border-radius:50%;width:28px;height:28px;line-height:28px;text-align:center;font-weight:bold;">2</div>',
        size: new naver.maps.Size(28, 28),
        anchor: new naver.maps.Point(14, 14)
    },
    title: "월정리해수욕장"
});



new naver.maps.Polyline({
    map: map,
    path: [new naver.maps.LatLng(33.5069232, 126.4929933),new naver.maps.LatLng(33.5557089, 126.7966561)],
    strokeColor: "#FF0000",
    strokeWeight: 4
});

</script>
</body>
</html>
