name: Deploy Spring Boot to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Jar
        working-directory: backend/backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend ./backend/backend

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend

      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend

            docker stop cliproute-backend || true
            docker rm cliproute-backend || true

            docker run -d \
              --name cliproute-backend \
              --env-file ~/app/.env \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend
