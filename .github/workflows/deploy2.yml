name: Deploy Spring Boot to EC2 (Self-hosted Runner)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Jar and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Jar
        working-directory: backend/backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend:latest ./backend/backend

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend:latest

  deploy:
    name: Deploy on EC2 Self-hosted Runner
    runs-on: [self-hosted, linux]
    needs: build-and-push

    steps:
      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend:latest

      - name: Stop and remove old container
        run: |
          docker stop cliproute-backend || true
          docker rm cliproute-backend || true

      - name: Run new container
        run: |
          docker run -d \
            --name cliproute-backend \
            --env-file /home/ubuntu/app/.env \
            -p 8080:8080 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/cliproute-backend:latest